name: 每日自动驾驶

on:
  schedule:
    - cron: '0 14 * * *'  # 每天UTC 14:00 = 北京22:00
  workflow_dispatch:       # 手动触发

jobs:
  daily-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run Auto Pilot
        run: python3 scripts/auto_pilot.py

      - name: Upload report
        uses: actions/upload-artifact@v3
        with:
          name: daily-report
          path: output/
